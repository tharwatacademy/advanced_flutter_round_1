name: Validate PR

on:
  pull_request:

jobs:
  android-validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: clone the repository
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: setup flutter
        uses: subosito/flutter-action@v4
        with:
          channel: stable
          cache: true

      - name: setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: android

      - name: Run fastlane validate_pr (analyze, test, Android APK)
        working-directory: android
        run: bundle exec fastlane validate_pr
